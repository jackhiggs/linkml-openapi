openapi: 3.0.3
info:
  title: bookstore
  description: A bookstore API demonstrating inheritance, relationships, and constraints.
  version: 1.0.0
servers:
- url: http://localhost:8000
paths:
  /books:
    get:
      tags:
      - Book
      summary: List books
      operationId: list_books
      parameters:
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 100
        name: limit
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 0
        name: offset
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
          description: Product title
        name: title
        in: query
        allowEmptyValue: false
        allowReserved: false
      responses:
        '200':
          description: List of Book objects
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Book'
                type: array
      deprecated: false
    post:
      tags:
      - Book
      summary: Create a Book
      operationId: create_book
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
  /books/{id}:
    get:
      tags:
      - Book
      summary: Get a Book
      operationId: get_book
      responses:
        '200':
          description: Book details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Book
      summary: Update a Book
      operationId: update_book
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Book
      summary: Delete a Book
      operationId: delete_book
      responses:
        '204':
          description: Book deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /books/{id}/authors:
    get:
      tags:
      - Book
      summary: List Author attached to Book.authors
      operationId: list_book_authors
      responses:
        '200':
          description: Author list
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Author'
                type: array
        '404':
          description: Parent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    post:
      tags:
      - Book
      summary: Attach Author to Book.authors
      operationId: attach_book_authors
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/ResourceLink'
              - items:
                  $ref: '#/components/schemas/ResourceLink'
                type: array
        required: true
      responses:
        '204':
          description: Attached
        '404':
          description: Parent or target not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /books/{id}/authors/{author_id}:
    delete:
      tags:
      - Book
      summary: Detach Author from Book.authors
      operationId: detach_book_authors
      responses:
        '204':
          description: Detached (target entity preserved)
        '404':
          description: Parent or attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
    - required: true
      deprecated: false
      schema:
        type: string
      name: author_id
      in: path
  /authors:
    get:
      tags:
      - Author
      summary: List authors
      operationId: list_authors
      parameters:
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 100
        name: limit
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 0
        name: offset
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
        name: name
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
          description: Short biography
        name: biography
        in: query
        allowEmptyValue: false
        allowReserved: false
      responses:
        '200':
          description: List of Author objects
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Author'
                type: array
      deprecated: false
    post:
      tags:
      - Author
      summary: Create a Author
      operationId: create_author
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
        required: true
      responses:
        '201':
          description: Author created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
  /authors/{id}:
    get:
      tags:
      - Author
      summary: Get a Author
      operationId: get_author
      responses:
        '200':
          description: Author details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Author
      summary: Update a Author
      operationId: update_author
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
        required: true
      responses:
        '200':
          description: Author updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Author
      summary: Delete a Author
      operationId: delete_author
      responses:
        '204':
          description: Author deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /books/{book_id}/authors/{id}:
    get:
      tags:
      - Book
      summary: Get a Author
      operationId: get_author_via_book
      responses:
        '200':
          description: Author details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Book
      summary: Update a Author
      operationId: update_author_via_book
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
        required: true
      responses:
        '200':
          description: Author updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Book
      summary: Delete a Author
      operationId: delete_author_via_book
      responses:
        '204':
          description: Author deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: book_id
      in: path
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
components:
  schemas:
    Product:
      properties:
        id:
          type: string
        title:
          type: string
          description: Product title
        price:
          type: number
          minimum: 0
          format: float
          description: Price in USD
      additionalProperties: false
      type: object
      required:
      - id
      - title
      - price
      title: Product
      description: An abstract product in the store
    Book:
      allOf:
      - $ref: '#/components/schemas/Product'
      - properties:
          isbn:
            type: string
            pattern: ^\d{13}$
            description: 13-digit ISBN
          page_count:
            type: integer
            maximum: 10000
            minimum: 1
          authors:
            items:
              type: string
              format: uri
            type: array
            description: Authors of the book
        additionalProperties: false
        type: object
        required:
        - isbn
      title: Book
      description: A book for sale
    Author:
      properties:
        id:
          type: string
        name:
          type: string
        biography:
          type: string
          description: Short biography
      additionalProperties: false
      type: object
      required:
      - id
      - name
      title: Author
      description: A book author
    Problem:
      properties:
        type:
          type: string
          format: uri
          description: A URI reference identifying the problem type.
          default: about:blank
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: A URI reference identifying this specific occurrence.
      additionalProperties: true
      type: object
      title: Problem
      description: "RFC 7807 Problem Details for HTTP APIs. Default error response\
        \ shape for non-2xx replies; additional members are permitted per RFC 7807\
        \ \xA73.2."
    ResourceLink:
      properties:
        id:
          type: string
          format: uri
          description: IRI of the linked resource.
      type: object
      required:
      - id
      title: ResourceLink
      description: A reference to another resource by IRI. Body shape for attach operations
        on reference relationships.

