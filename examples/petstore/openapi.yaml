openapi: 3.0.3
info:
  title: petstore
  description: A pet store API demonstrating custom paths, operation limiting, path
    variables, query params, and enums.
  version: 1.0.0
servers:
- url: http://localhost:8000
paths:
  /pets:
    get:
      tags:
      - Pet
      summary: List pets
      operationId: list_pets
      parameters:
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 100
        name: limit
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 0
        name: offset
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
          description: Name of the pet
        name: name
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          allOf:
          - $ref: '#/components/schemas/PetStatus'
          description: Current availability status
        name: status
        in: query
        allowEmptyValue: false
        allowReserved: false
      responses:
        '200':
          description: List of Pet objects
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Pet'
                type: array
      deprecated: false
    post:
      tags:
      - Pet
      summary: Create a Pet
      operationId: create_pet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
  /pets/{id}:
    get:
      tags:
      - Pet
      summary: Get a Pet
      operationId: get_pet
      responses:
        '200':
          description: Pet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Pet
      summary: Update a Pet
      operationId: update_pet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Pet
      summary: Delete a Pet
      operationId: delete_pet
      responses:
        '204':
          description: Pet deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: integer
        description: Unique pet identifier
      name: id
      in: path
  /owners/{owner_id}/pets/{id}:
    get:
      tags:
      - Owner
      summary: Get a Pet
      operationId: get_pet_via_owner
      responses:
        '200':
          description: Pet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Owner
      summary: Update a Pet
      operationId: update_pet_via_owner
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Owner
      summary: Delete a Pet
      operationId: delete_pet_via_owner
      responses:
        '204':
          description: Pet deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: owner_id
      in: path
    - required: true
      deprecated: false
      schema:
        type: integer
        description: Unique pet identifier
      name: id
      in: path
  /stores:
    get:
      tags:
      - Store
      summary: List stores
      operationId: list_stores
      parameters:
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 100
        name: limit
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 0
        name: offset
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
        name: name
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
        name: city
        in: query
        allowEmptyValue: false
        allowReserved: false
      responses:
        '200':
          description: List of Store objects
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Store'
                type: array
      deprecated: false
  /stores/{id}:
    get:
      tags:
      - Store
      summary: Get a Store
      operationId: get_store
      responses:
        '200':
          description: Store details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /owners:
    get:
      tags:
      - Owner
      summary: List owners
      operationId: list_owners
      parameters:
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 100
        name: limit
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: integer
          default: 0
        name: offset
        in: query
        allowEmptyValue: false
        allowReserved: false
      - required: false
        deprecated: false
        schema:
          type: string
        name: name
        in: query
        allowEmptyValue: false
        allowReserved: false
      responses:
        '200':
          description: List of Owner objects
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Owner'
                type: array
      deprecated: false
    post:
      tags:
      - Owner
      summary: Create a Owner
      operationId: create_owner
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Owner'
        required: true
      responses:
        '201':
          description: Owner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
  /owners/{id}:
    get:
      tags:
      - Owner
      summary: Get a Owner
      operationId: get_owner
      responses:
        '200':
          description: Owner details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    put:
      tags:
      - Owner
      summary: Update a Owner
      operationId: update_owner
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Owner'
        required: true
      responses:
        '200':
          description: Owner updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    delete:
      tags:
      - Owner
      summary: Delete a Owner
      operationId: delete_owner
      responses:
        '204':
          description: Owner deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /owners/{id}/pets:
    get:
      tags:
      - Owner
      summary: List Pet attached to Owner.pets
      operationId: list_owner_pets
      responses:
        '200':
          description: Pet list
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Pet'
                type: array
        '404':
          description: Parent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    post:
      tags:
      - Owner
      summary: Attach Pet to Owner.pets
      operationId: attach_owner_pets
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/ResourceLink'
              - items:
                  $ref: '#/components/schemas/ResourceLink'
                type: array
        required: true
      responses:
        '204':
          description: Attached
        '404':
          description: Parent or target not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
  /owners/{id}/pets/{pet_id}:
    delete:
      tags:
      - Owner
      summary: Detach Pet from Owner.pets
      operationId: detach_owner_pets
      responses:
        '204':
          description: Detached (target entity preserved)
        '404':
          description: Parent or attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      deprecated: false
    parameters:
    - required: true
      deprecated: false
      schema:
        type: string
      name: id
      in: path
    - required: true
      deprecated: false
      schema:
        type: integer
        description: Unique pet identifier
      name: pet_id
      in: path
components:
  schemas:
    Pet:
      properties:
        id:
          type: integer
          description: Unique pet identifier
        name:
          type: string
          description: Name of the pet
        status:
          allOf:
          - $ref: '#/components/schemas/PetStatus'
          description: Current availability status
        species:
          type: string
          description: Species of the pet
      additionalProperties: false
      type: object
      required:
      - id
      - name
      title: Pet
      description: A pet available in the store
    Store:
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
      additionalProperties: false
      type: object
      required:
      - id
      - name
      title: Store
      description: A physical store location
    Owner:
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          pattern: ^\S+@\S+\.\S+$
        pets:
          items:
            type: string
            format: uri
          type: array
          description: Pets owned by this person
      additionalProperties: false
      type: object
      required:
      - id
      - name
      title: Owner
      description: A pet owner
    PetStatus:
      type: string
      enum:
      - AVAILABLE
      - PENDING
      - SOLD
      title: PetStatus
      description: Availability status of a pet
    Problem:
      properties:
        type:
          type: string
          format: uri
          description: A URI reference identifying the problem type.
          default: about:blank
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: A URI reference identifying this specific occurrence.
      additionalProperties: true
      type: object
      title: Problem
      description: "RFC 7807 Problem Details for HTTP APIs. Default error response\
        \ shape for non-2xx replies; additional members are permitted per RFC 7807\
        \ \xA73.2."
    ResourceLink:
      properties:
        id:
          type: string
          format: uri
          description: IRI of the linked resource.
      type: object
      required:
      - id
      title: ResourceLink
      description: A reference to another resource by IRI. Body shape for attach operations
        on reference relationships.

