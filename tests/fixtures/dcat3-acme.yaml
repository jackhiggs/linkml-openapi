id: https://example.org/dcat3-acme
name: dcat3_acme
default_range: string

prefixes:
  dcat: http://www.w3.org/ns/dcat#
  dct:  http://purl.org/dc/terms/
  acme: https://example.com/acme/

classes:
  # --- Stock DCAT-3 subset ---

  Catalog:
    class_uri: dcat:Catalog
    annotations:
      openapi.resource: "true"
      openapi.path: catalogs
      openapi.tag: Catalogs
    attributes:
      id: { identifier: true, required: true }
      title: string
      dataset:
        slot_uri: dcat:dataset
        range: Dataset
        multivalued: true
        inlined: true
        inlined_as_list: true

  Dataset:
    class_uri: dcat:Dataset
    annotations:
      openapi.resource: "true"
      openapi.path: datasets
      openapi.tag: Datasets
    attributes:
      id: { identifier: true, required: true }
      title: string
      distribution:
        slot_uri: dcat:distribution
        range: Distribution
        multivalued: true
        inlined: true
        inlined_as_list: true

  Distribution:
    class_uri: dcat:Distribution
    annotations:
      openapi.resource: "true"
      openapi.path: distributions
      openapi.tag: Distributions
      openapi.nested_only: "true"
      openapi.parent_path: "Catalog.dataset/Dataset.distribution"
    attributes:
      id: { identifier: true, required: true }
      title: string
      mediaType: uri

  # --- Acme company overlay (fictional) ---
  # Two-hop chain exercising slot_usage narrowing in the middle hop:
  #   Catalog → dataset (range narrowed via AcmeDataset.slot_usage to
  #   AcmeDataset) → distribution (narrowed via
  #   AcmeDataset.slot_usage to AcmeDistribution)

  AcmeCatalog:
    is_a: Catalog
    class_uri: acme:AcmeCatalog
    annotations:
      openapi.resource: "true"
      openapi.path: acme-catalogs
      openapi.tag: AcmeCatalogs
    slot_usage:
      dataset:
        range: AcmeDataset   # narrowed from Dataset
    attributes:
      regulator: string

  AcmeDataset:
    is_a: Dataset
    class_uri: acme:AcmeDataset
    annotations:
      openapi.resource: "true"
      openapi.path: acme-datasets
      openapi.tag: AcmeDatasets
    slot_usage:
      distribution:
        range: AcmeDistribution   # narrowed from Distribution
    attributes:
      dataLineage: string
      confidentialityClassification: string

  AcmeDistribution:
    is_a: Distribution
    class_uri: acme:AcmeDistribution
    annotations:
      openapi.resource: "true"
      openapi.path: distributions
      openapi.tag: AcmeDistributions
      openapi.nested_only: "true"
      openapi.parent_path: "AcmeCatalog.dataset/AcmeDataset.distribution"
    attributes:
      s3BucketUri: uri
      kafkaTopic: string

