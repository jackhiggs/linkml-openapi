id: https://example.org/person-schema
name: person_schema
title: Person Schema
description: A test schema for persons

annotations:
  # --- Profiles for multi-view OpenAPI generation (issue #17) ---
  openapi.profile.external.description: Public surface; internal-only data hidden.
  openapi.profile.external.exclude_slots: avatar_blob,byte_size
  openapi.profile.external.exclude_classes: Reviewer
  openapi.profile.partner.exclude_slots: avatar_blob

prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://example.org/
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/

default_range: string

classes:
  NamedThing:
    abstract: true
    description: A generic named thing
    attributes:
      id:
        identifier: true
        range: string
        required: true
      name:
        range: string
        required: true
      description:
        range: string

  Person:
    is_a: NamedThing
    class_uri: schema:Person
    description: A person
    annotations:
      openapi.resource: "true"
      openapi.operations: "list,create,read,update,patch,delete"
      openapi.media_types: "application/json,application/ld+json,text/turtle"
    attributes:
      email:
        slot_uri: schema:email
        range: string
        pattern: "^\\S+@\\S+\\.\\S+$"
      age:
        slot_uri: foaf:age
        range: integer
        minimum_value: 0
        maximum_value: 200
      status:
        range: PersonStatus
      addresses:
        range: Address
        multivalued: true
      knows:
        range: Person
        multivalued: true
    slot_usage:
      id:
        annotations:
          openapi.path_variable: "true"
      name:
        annotations:
          openapi.query_param: sortable
      age:
        annotations:
          openapi.query_param: comparable,sortable
      knows:
        annotations:
          openapi.nested: "false"

  Address:
    description: A mailing address
    annotations:
      openapi.resource: "true"
      openapi.path: addresses
      openapi.operations: "list,read"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      street:
        range: string
      city:
        range: string
      postal_code:
        range: string
      byte_size:
        range: integer
        annotations:
          openapi.format: int64
      avatar_blob:
        range: string
        annotations:
          openapi.format: binary
      tags:
        range: string
        multivalued: true
        annotations:
          openapi.format: byte

  Organization:
    is_a: NamedThing
    description: An organization
    attributes:
      founding_date:
        range: date

  Catalog:
    description: A catalog whose URL uses a slug rather than the full IRI
    annotations:
      openapi.resource: "true"
      openapi.path: catalogs
      openapi.operations: "list,read"
    attributes:
      id:
        identifier: true
        range: uri
        required: true
    slot_usage:
      id:
        annotations:
          openapi.path_variable: slug

  Order:
    description: A composition example — line items have no independent identity
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      line_items:
        range: LineItem
        multivalued: true
        inlined: true
        inlined_as_list: true

  LineItem:
    description: An order line item (composed, has its own identifier)
    attributes:
      line_id:
        identifier: true
        range: string
        required: true
      sku:
        range: string
      quantity:
        range: integer

  # --- Discriminator: openapi.discriminator + openapi.type_value (existing-system case) ---
  Product:
    abstract: true
    description: Polymorphic root using a custom field name and uppercase type values.
    annotations:
      openapi.discriminator: kind
    attributes:
      sku:
        identifier: true
        range: string
        required: true

  Book:
    is_a: Product
    annotations:
      openapi.type_value: BOOK
    attributes:
      title:
        range: string

  Vinyl:
    is_a: Product
    annotations:
      openapi.type_value: VINYL
    attributes:
      artist:
        range: string

  # --- Discriminator on a NON-abstract parent (issue #52) ---
  # Vehicle is a concrete LinkML class but is the union root of the
  # discriminator group. The fix at #52 ensures Vehicle is excluded
  # from its own oneOf / discriminator.mapping — codegens (Spring
  # server) read parent self-references as cyclic inheritance.
  Vehicle:
    annotations:
      openapi.discriminator: vehicle_type
    attributes:
      vin:
        identifier: true
        range: string
        required: true

  Car:
    is_a: Vehicle
    annotations:
      openapi.type_value: car
    attributes:
      doors:
        range: integer

  Truck:
    is_a: Vehicle
    annotations:
      openapi.type_value: truck
    attributes:
      payload_tons:
        range: float

  # --- Inverse-direction nested paths (issue #19) ---
  # Article.reviewers declares `inverse: Reviewer.articles` — Reviewer
  # has no explicit `articles` slot, so the generator synthesises the
  # reverse-direction path `/reviewers/{id}/articles`.
  Article:
    annotations:
      openapi.resource: "true"
    attributes:
      doi:
        identifier: true
        range: string
        required: true
      title:
        range: string
      reviewers:
        range: Reviewer
        multivalued: true
        inverse: Reviewer.articles

  Reviewer:
    annotations:
      openapi.resource: "true"
    attributes:
      reviewer_id:
        identifier: true
        range: string
        required: true
      full_name:
        range: string

  # --- Discriminator: LinkML-native designates_type ---
  Animal:
    abstract: true
    description: Polymorphic root using LinkML's designates_type signal.
    attributes:
      species:
        designates_type: true
        range: string
      tag:
        identifier: true
        range: string
        required: true

  Dog:
    is_a: Animal

  Cat:
    is_a: Animal

  # --- Deep nested item paths via parent chain (issue #32) ---
  # Three-level chain. `openapi.path_id` on each ancestor renames the URL
  # parameter from the default `<class>_id` snake form to camelCase, so the
  # generated paths match DCAT3-shaped conventions:
  #   /catalogs/{catalogId}
  #   /catalogs/{catalogId}/datasets/{datasetId}
  #   /catalogs/{catalogId}/datasets/{datasetId}/distributions/{distId}
  Catalog2:
    annotations:
      openapi.resource: "true"
      openapi.path: catalogs2
      openapi.path_id: catalog2Id
    attributes:
      id:
        identifier: true
        range: string
        required: true
      datasets:
        range: Dataset2
        multivalued: true

  Dataset2:
    annotations:
      openapi.resource: "true"
      openapi.path: datasets2
      openapi.path_id: dataset2Id
    attributes:
      id:
        identifier: true
        range: string
        required: true
      distributions:
        range: Distribution2
        multivalued: true

  # `openapi.nested_only: "true"` drops the flat `/distributions2` /
  # `/distributions2/{id}` paths — Distribution2 is canonical only under its
  # parent chain.
  Distribution2:
    annotations:
      openapi.resource: "true"
      openapi.path: distributions2
      openapi.path_id: dist2Id
      openapi.nested_only: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true

  # --- Ambiguous parent chain → openapi.parent_path resolves it ---
  # Tag2 is reachable via Folder.tags AND Bookmark.tags. The leaf declares
  # the canonical chain so the generator picks one deterministically.
  Folder:
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      tags:
        range: Tag2
        multivalued: true

  Bookmark:
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      tags:
        range: Tag2
        multivalued: true

  # --- openapi.flat_only: drops deep emission, keeps flat (issue #36) ---
  # Note2 has chain [(Folder2, notes)] but `flat_only` suppresses the deep
  # /folders2/{id}/notes/{id} emission. The single-level nested form from
  # Folder2 (/folders2/{id}/notes/{note2_id}) still emits — that's about
  # Folder2 as a parent, not Note2 as a leaf.
  Folder2:
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      notes:
        range: Note2
        multivalued: true

  Note2:
    annotations:
      openapi.resource: "true"
      openapi.flat_only: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      body:
        range: string

  # --- openapi.path_template: literal URL with name:Class.slot sources (issue #36) ---
  # The auto-derived chain would give /catalogs2/{c2}/.../distributions2/{...},
  # but ResourceVersion lives at a hand-authored URL with literal segments
  # ("by-doi") and a compound key (doi + version) the relationship graph
  # can't express. The template wins; nested_only drops the flat path so
  # only the templated URL is canonical.
  ResourceVersion:
    annotations:
      openapi.resource: "true"
      openapi.path: resource_versions
      openapi.path_template: "/v2/catalogs/{cId}/resources/by-doi/{doi}/{version}"
      openapi.path_param_sources: "cId:Catalog2.id,doi:ResourceVersion.doi,version:ResourceVersion.version"
      openapi.nested_only: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      doi:
        range: string
        required: true
      version:
        range: string
        required: true

  Tag2:
    annotations:
      openapi.resource: "true"
      openapi.parent_path: Folder.tags
    attributes:
      id:
        identifier: true
        range: string
        required: true
      label:
        range: string

  # --- Layered opt-out for auto-inferred query params (issue #34) ---
  # `BigCatalogItem` opts out of auto-inference at the class level so that
  # only `limit` / `offset` emit on its list endpoint, regardless of how
  # many scalar slots it carries. `RegularItem` keeps the default and the
  # `secret_field` slot opts out per-slot.
  BigCatalogItem:
    description: A class with many slots that don't all make sense as filters.
    annotations:
      openapi.resource: "true"
      openapi.auto_query_params: "false"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      title:
        range: string
      description:
        range: string
      created:
        range: datetime
      updated:
        range: datetime
      ten:
        range: integer
      eleven:
        range: integer
      twelve:
        range: integer

  # --- Per-slot URL segment override (issue #38) ---
  # `web_resources` is a snake_case slot identifier (LinkML grammar), but the
  # public URL renders the segment as `web-resources` via the slot-level
  # `openapi.path_segment` annotation. The body schema, operation IDs, and
  # tags continue to use the underscore form.
  Hub:
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      web_resources:
        range: WebResource
        multivalued: true
    slot_usage:
      web_resources:
        annotations:
          openapi.path_segment: "web-resources"

  WebResource:
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true

  RegularItem:
    description: A class that keeps default auto-inference but opts out of one slot.
    annotations:
      openapi.resource: "true"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      title:
        range: string
      secret_field:
        range: string
        annotations:
          openapi.query_param: "false"

  # --- Slot-annotation inheritance through is_a (issue #40) ---
  # `BaseResource` declares `openapi.nested: "false"` on the
  # `classified_by` slot via slot_usage. The two subclasses inherit the
  # slot AND the suppression — the nested-path emitter must NOT emit
  # `/foo_resources/{id}/classified_by` or
  # `/bar_resources/{id}/classified_by`.
  Classifier:
    description: Used as the range of the suppressed slot — needs to be a class
      so the nested walk would otherwise pick the slot up.
    attributes:
      id:
        identifier: true
        range: string
        required: true

  BaseResource:
    abstract: true
    description: Parent that declares the suppression once for all subclasses.
    attributes:
      id:
        identifier: true
        range: string
        required: true
      classified_by:
        range: Classifier
        multivalued: true
    slot_usage:
      classified_by:
        annotations:
          openapi.nested: "false"

  FooResource:
    is_a: BaseResource
    annotations:
      openapi.resource: "true"

  BarResource:
    is_a: BaseResource
    annotations:
      openapi.resource: "true"

  # --- Multi-level composition + openapi.tag (issue #44) ---
  # Library composes BookEntry composes ChapterEntry. The composed
  # targets are not resources in their own right; they have no flat
  # path. The deeper composition chain emits naturally:
  #   /libraries/{libraryId}/books            (collection)
  #   /libraries/{libraryId}/books/{bookId}   (item)
  #   /libraries/{libraryId}/books/{bookId}/chapters
  #   /libraries/{libraryId}/books/{bookId}/chapters/{chapterId}
  # Operations are tagged by `openapi.tag` (Library / Book / Chapter),
  # not by class name (Library / BookEntry / ChapterEntry).
  Library:
    annotations:
      openapi.resource: "true"
      openapi.path_id: libraryId
      openapi.tag: Library
    attributes:
      id:
        identifier: true
        range: string
        required: true
      books:
        range: BookEntry
        multivalued: true
        inlined: true
        inlined_as_list: true

  BookEntry:
    annotations:
      openapi.path_id: bookId
      openapi.tag: Book
    attributes:
      id:
        identifier: true
        range: string
        required: true
      chapters:
        range: ChapterEntry
        multivalued: true
        inlined: true
        inlined_as_list: true

  ChapterEntry:
    annotations:
      openapi.path_id: chapterId
      openapi.tag: Chapter
    attributes:
      id:
        identifier: true
        range: string
        required: true
      title:
        range: string

enums:
  PersonStatus:
    description: Status of a person
    permissible_values:
      ALIVE:
        description: Living
      DEAD:
        description: Deceased
      UNKNOWN:
        description: Unknown
