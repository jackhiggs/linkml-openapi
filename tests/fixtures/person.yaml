id: https://example.org/person-schema
name: person_schema
title: Person Schema
description: A test schema for persons

prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://example.org/
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/

default_range: string

classes:
  NamedThing:
    abstract: true
    description: A generic named thing
    attributes:
      id:
        identifier: true
        range: string
        required: true
      name:
        range: string
        required: true
      description:
        range: string

  Person:
    is_a: NamedThing
    class_uri: schema:Person
    description: A person
    annotations:
      openapi.resource: "true"
      openapi.media_types: "application/json,application/ld+json,text/turtle"
    attributes:
      email:
        slot_uri: schema:email
        range: string
        pattern: "^\\S+@\\S+\\.\\S+$"
      age:
        slot_uri: foaf:age
        range: integer
        minimum_value: 0
        maximum_value: 200
      status:
        range: PersonStatus
      addresses:
        range: Address
        multivalued: true
      primary_address:
        range: Address
        description: The person's primary mailing address
      secret_address:
        range: Address
        description: An address we deliberately do NOT expose as a sub-resource
        annotations:
          openapi.nested: "false"
    slot_usage:
      id:
        annotations:
          openapi.path_variable: "true"
      name:
        annotations:
          openapi.query_param: "true"
      age:
        annotations:
          openapi.query_param: "true"

  Address:
    description: A mailing address
    annotations:
      openapi.resource: "true"
      openapi.path: addresses
      openapi.operations: "list,read"
    attributes:
      id:
        identifier: true
        range: string
        required: true
      street:
        range: string
      city:
        range: string
      postal_code:
        range: string
      byte_size:
        range: integer
        annotations:
          openapi.format: int64
      avatar_blob:
        range: string
        annotations:
          openapi.format: binary
      tags:
        range: string
        multivalued: true
        annotations:
          openapi.format: byte

  Organization:
    is_a: NamedThing
    description: An organization
    annotations:
      openapi.nest_subresources: "false"
    attributes:
      founding_date:
        range: date
      headquarters:
        range: Address
        description: HQ address — suppressed because the class disables nesting

  Catalog:
    description: A catalog whose URL uses a slug rather than the full IRI
    annotations:
      openapi.resource: "true"
      openapi.path: catalogs
      openapi.operations: "list,read"
    attributes:
      id:
        identifier: true
        range: uri
        required: true
    slot_usage:
      id:
        annotations:
          openapi.path_variable: slug

enums:
  PersonStatus:
    description: Status of a person
    permissible_values:
      ALIVE:
        description: Living
      DEAD:
        description: Deceased
      UNKNOWN:
        description: Unknown
